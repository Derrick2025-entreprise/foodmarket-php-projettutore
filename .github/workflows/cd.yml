# ─────────────────────────────────────────────────────────────
# cd.yml — Pipeline de Déploiement Continu (CD)
#
# Se déclenche sur :
#   - Push sur main → déploiement automatique en STAGING
#   - Tag v*.*.* (ex: v1.0.0) → déploiement en PRODUCTION
#
# Prérequis (secrets GitHub à configurer) :
#   DOCKER_USERNAME   → Nom d'utilisateur Docker Hub
#   DOCKER_PASSWORD   → Token Docker Hub (pas le mot de passe)
#   STAGING_HOST      → IP ou domaine du serveur staging
#   STAGING_USER      → Utilisateur SSH du serveur staging
#   STAGING_SSH_KEY   → Clé SSH privée pour le serveur staging
# ─────────────────────────────────────────────────────────────

name: CD — FoodMarket PHP

on:
  push:
    branches: [main]         # Staging : à chaque push sur main
    tags: ["v*.*.*"]         # Production : à chaque tag de version

jobs:

  # ── Job 1 : Push de l'image sur Docker Hub ─────────────────
  push-image:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extraction des métadonnées (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: derrickdev/foodmarket-php
          tags: |
            # Tag avec le SHA du commit (ex: sha-abc1234)
            type=sha
            # Tag "latest" sur main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag de version sur les tags Git (ex: v1.0.0)
            type=semver,pattern={{version}}

      - name: Build et push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2 : Déploiement Staging ────────────────────────────
  # Se déclenche uniquement sur push vers main (pas sur les tags)
  deploy-staging:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: push-image
    if: github.ref == 'refs/heads/main'   # Seulement sur main

    steps:
      - name: Déploiement sur le serveur staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            # Aller dans le dossier du projet
            cd /opt/foodmarket

            # Récupérer la dernière image
            docker pull derrickdev/foodmarket-php:latest

            # Redémarrer les containers avec la nouvelle image
            docker-compose pull
            docker-compose up -d --no-build

            # Exécuter les migrations de base de données
            docker-compose exec -T app php spark migrate --force

            echo "✅ Déploiement staging terminé"

  # ── Job 3 : Déploiement Production ─────────────────────────
  # Se déclenche uniquement sur les tags de version (v*.*.*)
  deploy-production:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: push-image
    if: startsWith(github.ref, 'refs/tags/v')   # Seulement sur tags

    # Environnement protégé : nécessite une approbation manuelle
    environment:
      name: production
      url: https://foodmarket.example.com

    steps:
      - name: Déploiement en production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/foodmarket

            # Récupérer la version taguée
            docker pull derrickdev/foodmarket-php:${{ github.ref_name }}

            # Mise à jour avec la version taguée
            IMAGE_TAG=${{ github.ref_name }} docker-compose up -d --no-build

            # Migrations
            docker-compose exec -T app php spark migrate --force

            echo "✅ Déploiement production ${{ github.ref_name }} terminé"
