name: CD — FoodMarket PHP

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:

  # ── Build & Push Docker Hub ─────────────────────────────────
  push-image:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/setup-buildx-action@v3

      - name: Métadonnées de l'image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/foodmarket-php
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build et push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Déploiement Staging (désactivé — pas de serveur configuré) ──
  # Pour activer : retirer le "if: false" et configurer STAGING_HOST,
  # STAGING_USER, STAGING_SSH_KEY dans les secrets GitHub
  deploy-staging:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: push-image
    if: false

    steps:
      - name: Déploiement staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/foodmarket
            docker pull ${{ secrets.DOCKER_USERNAME }}/foodmarket-php:latest
            docker-compose up -d --no-build
            docker-compose exec -T app php spark migrate --force
            echo "✅ Staging déployé"

  # ── Déploiement Production (désactivé — pas de serveur configuré) ──
  # Pour activer : retirer le "if: false" et configurer PROD_HOST,
  # PROD_USER, PROD_SSH_KEY dans les secrets GitHub
  deploy-production:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: push-image
    if: false

    environment:
      name: production
      url: https://foodmarket.example.com

    steps:
      - name: Déploiement production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/foodmarket
            docker pull ${{ secrets.DOCKER_USERNAME }}/foodmarket-php:${{ github.ref_name }}
            IMAGE_TAG=${{ github.ref_name }} docker-compose up -d --no-build
            docker-compose exec -T app php spark migrate --force
            echo "✅ Production ${{ github.ref_name }} déployée"
