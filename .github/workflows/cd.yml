name: CD — FoodMarket PHP

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

jobs:

  # ── Job 1 : Build & Push Docker Hub ────────────────────────
  push-image:
    name: Build & Push Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extraction des métadonnées (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: derrickdev/foodmarket-php
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}

      - name: Build et push de l'image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2 : Déploiement Staging (optionnel) ────────────────
  # Ne s'exécute que si le secret STAGING_HOST est configuré
  deploy-staging:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: push-image
    if: |
      github.ref == 'refs/heads/main' &&
      secrets.STAGING_HOST != ''

    steps:
      - name: Déploiement sur le serveur staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/foodmarket
            docker pull derrickdev/foodmarket-php:latest
            docker-compose pull
            docker-compose up -d --no-build
            docker-compose exec -T app php spark migrate --force
            echo "✅ Déploiement staging terminé"

  # ── Job 3 : Déploiement Production (optionnel) ─────────────
  # Ne s'exécute que sur un tag v*.*.* ET si PROD_HOST est configuré
  deploy-production:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: push-image
    if: |
      startsWith(github.ref, 'refs/tags/v') &&
      secrets.PROD_HOST != ''

    environment:
      name: production
      url: https://foodmarket.example.com

    steps:
      - name: Déploiement en production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/foodmarket
            docker pull derrickdev/foodmarket-php:${{ github.ref_name }}
            IMAGE_TAG=${{ github.ref_name }} docker-compose up -d --no-build
            docker-compose exec -T app php spark migrate --force
            echo "✅ Déploiement production ${{ github.ref_name }} terminé"
