name: CI — FoodMarket PHP

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1 : Lint PHP ───────────────────────────────────────
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Vérification syntaxe PHP (tous les fichiers)
        run: |
          find app/ -name "*.php" -exec php -l {} \;
          echo "✅ Lint PHP terminé — aucune erreur"

  # ── Job 2 : Tests PHPUnit ──────────────────────────────────
  test:
    name: Tests PHPUnit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de PHP 8.2 avec extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: intl, mbstring, sqlite3, pdo_sqlite, mysqli
          coverage: xdebug

      - name: Cache des dépendances Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installation des dépendances Composer
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Régénération de l'autoloader
        run: composer dump-autoload --optimize

      - name: Copie du fichier .env pour les tests
        run: |
          cp .env.example .env
          mkdir -p writable/cache writable/logs writable/session writable/uploads
          touch writable/tests.db
          chmod 777 writable/tests.db

      - name: Lancement des tests PHPUnit
        run: composer test
        env:
          CI_ENVIRONMENT: testing

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: build/coverage/

  # ── Job 3 : Build Docker ───────────────────────────────────
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build de l'image Docker (sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: foodmarket-php:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4 : Analyse SonarQube ──────────────────────────────
  sonarqube:
    name: Analyse SonarQube
    runs-on: ubuntu-latest
    needs: test
    if: ${{ vars.SONAR_ENABLED == 'true' }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installation de PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: intl, mbstring, sqlite3, pdo_sqlite
          coverage: xdebug

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Génération du rapport de couverture pour SonarQube
        run: |
          cp .env.testing .env
          mkdir -p writable/cache writable/logs writable/session writable/uploads
          vendor/bin/phpunit --coverage-clover build/coverage/clover.xml
        env:
          CI_ENVIRONMENT: testing

      - name: Scan SonarQube
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Job 5 : Audit sécurité Composer ────────────────────────
  security:
    name: Audit Sécurité
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: intl, mbstring, sqlite3, pdo_sqlite, mysqli
          tools: composer

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Audit des vulnérabilités Composer
        run: composer audit --no-dev || true
