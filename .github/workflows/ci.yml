name: CI — FoodMarket PHP

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1 : Lint PHP ───────────────────────────────────────
  lint:
    name: Lint PHP
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer

      - name: Vérification syntaxe PHP
        run: find app/ -name "*.php" -exec php -l {} \; && echo "✅ Lint OK"

  # ── Job 2 : Tests PHPUnit ──────────────────────────────────
  test:
    name: Tests PHPUnit
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: intl, mbstring, sqlite3, pdo_sqlite, mysqli
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Installation des dépendances
        run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Autoloader
        run: composer dump-autoload --optimize

      - name: Préparation de l'environnement de test
        run: |
          cp .env.example .env
          mkdir -p writable/cache writable/logs writable/session writable/uploads
          touch writable/tests.db
          chmod 666 writable/tests.db

      - name: Lancement des tests
        run: vendor/bin/phpunit --no-coverage
        env:
          CI_ENVIRONMENT: testing

  # ── Job 3 : Build Docker ───────────────────────────────────
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (sans push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: foodmarket-php:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4 : SonarQube (optionnel) ──────────────────────────
  sonarqube:
    name: Analyse SonarQube
    runs-on: ubuntu-latest
    needs: test
    if: vars.SONAR_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: intl, mbstring, sqlite3, pdo_sqlite
          coverage: xdebug

      - run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Rapport de couverture
        run: |
          cp .env.example .env
          mkdir -p writable/cache writable/logs writable/session writable/uploads
          touch writable/tests.db
          chmod 666 writable/tests.db
          vendor/bin/phpunit --coverage-clover build/coverage/clover.xml
        env:
          CI_ENVIRONMENT: testing

      - uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Job 5 : Audit sécurité ─────────────────────────────────
  security:
    name: Audit Sécurité
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: intl, mbstring, sqlite3, pdo_sqlite, mysqli
          tools: composer

      - run: composer install --no-interaction --prefer-dist --no-scripts

      - name: Audit vulnérabilités
        run: composer audit --no-dev || true
