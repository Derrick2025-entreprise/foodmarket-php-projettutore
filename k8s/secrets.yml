# ─────────────────────────────────────────────────────────────
# k8s/secrets.yml — Secrets Kubernetes FoodMarket
#
# Stocke les informations sensibles (mots de passe, tokens)
# de façon sécurisée dans Kubernetes.
#
# ⚠️  Les valeurs sont encodées en base64 :
#     echo -n "valeur" | base64
#
# Valeurs actuelles (à remplacer en production) :
#   fooduser   → Zm9vZHVzZXI=
#   foodpass   → Zm9vZHBhc3M=
#
# Usage :
#   kubectl apply -f k8s/secrets.yml
# ─────────────────────────────────────────────────────────────

apiVersion: v1
kind: Secret
metadata:
  name: foodmarket-secrets
  labels:
    app: foodmarket
type: Opaque
data:
  # echo -n "fooduser" | base64
  db-username: Zm9vZHVzZXI=
  # echo -n "foodpass" | base64
  db-password: Zm9vZHBhc3M=
