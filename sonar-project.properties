# ─────────────────────────────────────────────────────────────
# sonar-project.properties — Configuration SonarQube
#
# Définit comment SonarQube analyse le projet PHP.
# Le token SONAR_TOKEN est stocké dans les secrets GitHub.
# ─────────────────────────────────────────────────────────────

# Identifiant unique du projet dans SonarQube
sonar.projectKey=foodmarket-php
sonar.projectName=FoodMarket PHP
sonar.projectVersion=1.0

# Dossiers à analyser
sonar.sources=app
sonar.tests=tests

# Langage principal
sonar.language=php

# Rapport de couverture généré par PHPUnit (clover.xml)
sonar.php.coverage.reportPaths=build/coverage/clover.xml

# Exclusions : ne pas analyser vendor/ ni les fichiers de config
sonar.exclusions=vendor/**,public/index.php

# Encodage des fichiers source
sonar.sourceEncoding=UTF-8
