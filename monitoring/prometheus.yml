# ─────────────────────────────────────────────────────────────
# prometheus.yml — Configuration Prometheus FoodMarket
# ─────────────────────────────────────────────────────────────

global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:

  # Prometheus se surveille lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métriques applicatives FoodMarket
  - job_name: 'foodmarket-app'
    static_configs:
      - targets: ['app:80']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Métriques système (CPU, RAM, réseau)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
