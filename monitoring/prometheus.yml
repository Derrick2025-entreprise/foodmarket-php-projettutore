# ─────────────────────────────────────────────────────────────
# prometheus.yml — Configuration Prometheus
# Scrape les métriques de l'application toutes les 15 secondes
# ─────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s      # Fréquence de collecte des métriques
  evaluation_interval: 15s  # Fréquence d'évaluation des règles d'alerte

scrape_configs:

  # Prometheus se surveille lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métriques de l'application FoodMarket
  - job_name: 'foodmarket'
    static_configs:
      - targets: ['app:80']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # Métriques système (CPU, RAM, réseau) via node-exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
