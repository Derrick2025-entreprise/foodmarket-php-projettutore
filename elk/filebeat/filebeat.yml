# ─────────────────────────────────────────────────────────────
# filebeat.yml — Configuration Filebeat
#
# Filebeat collecte les logs des fichiers et les envoie
# vers Logstash pour traitement.
#
# Logs collectés :
#   - Logs CodeIgniter 4 : writable/logs/*.log
#   - Logs Apache        : /var/log/apache2/*.log
# ─────────────────────────────────────────────────────────────

filebeat.inputs:

  # ── Logs de l'application CodeIgniter 4 ──────────────────
  - type: log
    enabled: true
    paths:
      - /var/www/html/writable/logs/*.log
    fields:
      type: codeigniter
      application: foodmarket-php
    fields_under_root: true
    # Lire les logs JSON ligne par ligne
    json.keys_under_root: true
    json.overwrite_keys: true

  # ── Logs Apache ───────────────────────────────────────────
  - type: log
    enabled: true
    paths:
      - /var/log/apache2/access.log
      - /var/log/apache2/error.log
    fields:
      type: apache
      application: foodmarket-php
    fields_under_root: true

# ── Envoi vers Logstash ───────────────────────────────────────
output.logstash:
  hosts: ["logstash:5044"]

# ── Niveau de log Filebeat ────────────────────────────────────
logging.level: info
logging.to_files: true
logging.files:
  path: /var/log/filebeat
  name: filebeat
  keepfiles: 7
