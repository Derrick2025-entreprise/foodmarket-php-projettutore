# ─────────────────────────────────────────────────────────────
# logstash.conf — Pipeline Logstash pour FoodMarket
#
# Flux de traitement des logs :
#   1. INPUT  : Reçoit les logs depuis Filebeat (port 5044)
#   2. FILTER : Parse les logs JSON de CodeIgniter 4
#   3. OUTPUT : Envoie vers Elasticsearch
# ─────────────────────────────────────────────────────────────

# ── Entrée : réception des logs ───────────────────────────────
input {
  # Reçoit les logs envoyés par Filebeat
  beats {
    port => 5044
  }

  # Optionnel : logs directs via TCP (utile pour les tests)
  tcp {
    port => 5000
    codec => json_lines
  }
}

# ── Filtre : transformation des logs ─────────────────────────
filter {

  # Parser les logs JSON de CodeIgniter 4
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "log_data"
    }

    # Extraire les champs importants du log CI4
    mutate {
      rename => {
        "[log_data][level]"   => "log_level"
        "[log_data][message]" => "log_message"
        "[log_data][context]" => "log_context"
      }
    }
  }

  # Parser les logs Apache (format Combined Log)
  if [fields][type] == "apache" {
    grok {
      match => {
        "message" => '%{COMBINEDAPACHELOG}'
      }
    }

    # Convertir le code HTTP en entier
    mutate {
      convert => { "response" => "integer" }
    }

    # Ajouter un champ "error" si code HTTP >= 400
    if [response] >= 400 {
      mutate {
        add_field => { "is_error" => true }
      }
    }
  }

  # Ajouter un timestamp normalisé
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Ajouter le nom de l'application
  mutate {
    add_field => { "application" => "foodmarket-php" }
  }
}

# ── Sortie : envoi vers Elasticsearch ────────────────────────
output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]

    # Index par jour : foodmarket-logs-2026.03.21
    index => "foodmarket-logs-%{+YYYY.MM.dd}"
  }

  # Afficher les logs dans la console Logstash (debug)
  stdout {
    codec => rubydebug
  }
}
